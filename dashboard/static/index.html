<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Fintellix Risk Suite — Financial intelligence and risk monitoring">
    <title>Fintellix — Risk Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>

<body>
    <div class="app">

        <!-- ═══ Header ═══ -->
        <header class="header">
            <div class="header__brand">
                <div class="header__logo">F</div>
                <div class="header__wordmark">
                    Fintellix
                    <span class="header__tag">PRO</span>
                </div>
            </div>

            <div class="header__left">
                <button class="nav-item active" data-view="overview">Overview</button>
                <button class="nav-item" data-view="companies">Companies</button>
                <button class="nav-item" data-view="sectors">Sectors</button>
                <button class="nav-item" data-view="live">Live</button>
            </div>

            <div class="header__right">
                <div class="search-box">
                    <span class="search-box__icon">
                        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8" />
                            <line x1="21" y1="21" x2="16.65" y2="16.65" />
                        </svg>
                    </span>
                    <input type="text" id="header-search" class="search-box__input"
                        placeholder="Search ticker — e.g. AAPL">
                </div>
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <span class="status-text">Terminal Online</span>
                </div>
            </div>
        </header>



        <!-- ═══ Main ═══ -->
        <main class="main">
            <div class="content">

                <!-- Overview -->
                <div class="view active" id="view-overview">
                    <div class="kpi-grid" id="overview-kpis"></div>
                    <div id="overview-top-stressed"></div>
                    <div class="divider"></div>
                    <div style="display:flex; flex-direction:column; gap:24px;">
                        <div class="chart-container"><canvas id="chart-score-dist"></canvas></div>
                        <div class="divider"></div>
                        <div class="chart-container"><canvas id="chart-risk-donut"></canvas></div>
                        <div class="divider"></div>
                        <div class="chart-container"><canvas id="chart-sector-bars"></canvas></div>
                    </div>
                </div>

                <!-- Companies -->
                <div class="view" id="view-companies">

                    <div class="filter-bar">
                        <select id="filter-sector" class="filter-select">
                            <option value="all">All Sectors</option>
                            <option value="Technology">Technology</option>
                            <option value="Retail">Retail</option>
                            <option value="Energy">Energy</option>
                            <option value="Financial_Services">Financial Services</option>
                            <option value="Healthcare">Healthcare</option>
                        </select>
                        <select id="filter-risk" class="filter-select">
                            <option value="all">All Risk Levels</option>
                            <option value="critical">Critical</option>
                            <option value="high">High</option>
                            <option value="moderate">Moderate</option>
                            <option value="low">Low</option>
                        </select>
                    </div>

                    <div id="companies-list"></div>
                </div>

                <!-- Sectors -->
                <div class="view" id="view-sectors">
                    <div class="section-header">
                        <div>
                            <h1 class="section-header__title">Sector Analysis</h1>
                            <div class="section-header__subtitle">Aggregated health metrics by sector</div>
                        </div>
                    </div>
                    <div id="sectors-content"></div>
                </div>

                <!-- Company Detail -->
                <div class="view" id="view-detail">
                    <div id="detail-header"></div>
                    <div class="charts-grid mt-4">
                        <div class="card">
                            <div class="card-label">Financial Ratios</div>
                            <div id="detail-ratios"></div>
                        </div>
                        <div class="card">
                            <div id="detail-gauge"></div>
                            <div class="card-label" style="margin-top:var(--sp7)">Model Components</div>
                            <div id="detail-models"></div>
                        </div>
                    </div>
                    <div class="card mt-6">
                        <div class="card-label">Historical Trends</div>
                        <div class="chart-container chart-container--lg"><canvas id="chart-history"></canvas></div>
                    </div>
                    <div class="card mt-6">
                        <div class="card-label">Red Flags</div>
                        <div id="detail-flags"></div>
                    </div>
                </div>

                <!-- Live Scorer -->
                <div class="view" id="view-live">
                    <div class="section-header">
                        <div>
                            <h1 class="section-header__title">Live Scorer</h1>
                            <div class="section-header__subtitle">Real-time analysis via SEC EDGAR Data Connector</div>
                        </div>
                    </div>

                    <div class="live-search">
                        <h2 class="live-search__title">Live Ticker Scorer</h2>
                        <p class="live-search__desc">Enter a ticker symbol for real-time risk analysis</p>
                        <form class="live-search__form" id="live-form">
                            <input type="text" id="live-ticker-input" class="live-search__input" placeholder="NVDA"
                                maxlength="6">
                            <button type="submit" class="live-search__btn">Analyze</button>
                        </form>
                        <div class="progress-bar hidden" id="live-progress">
                            <div class="progress-bar__fill"></div>
                        </div>
                    </div>
                    <div id="live-result"></div>
                </div>

            </div><!-- /content -->
        </main>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay hidden" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
